<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y7.com</title>
<link rel="stylesheet" href="trangchu.css">
</head>

<body>

<!-- HEADER -->
<header>
<div class="logo">Y7.com</div>

<nav>
<ul>
<li><a href="#" onclick="showHome()">Trang Chủ</a></li>
</ul>
</nav>

<input type="text" id="searchBar" placeholder="Tìm game...">
</header>


<div class="layout">

<!-- Quảng cáo trái -->
<div class="ads left-ads">

<div class="qc1">
<button class="close-ad1">✖</button>
<img class="qc1" src="images/qc2.jpg">
</div>

<div class="qc2">
<button class="close-ad2">✖</button>
<img class="qc2" src="images/qc3.jpg">
</div>

<div class="qc3">
<button class="close-ad3">✖</button>
<img class="qc3" src="images/qc4.jpg">
</div>

</div>


<!-- Nội dung chính -->
<div class="main-content">

<main id="game-container">

<div class="game-grid" id="gameGrid">

<div class="game-card" data-name="flappy bird" data-url="maybay.html">
<img src="images/maybay.png">
<p>plane</p>
</div>

<div class="game-card" data-name="chim bay" data-url="chim.html">
<img src="images/b1.png">
<p>chim bay</p>
</div>

<div class="game-card" data-name="ban thuyen" data-url="banchim.html">
<img src="images/b1.png">
<p>ban chim</p>
</div>

<div class="game-card" data-name="ban ruoi" data-url="banruoi.html">
<img src="images/CI4_SuperChick.png">
<p>ban ruoi</p>
</div>

</div>

<p id="noResult" class="hidden" style="color:white;text-align:center;">
Không tìm thấy game 😢
</p>


<!-- PLAYER GAME -->
<div id="player-screen" class="hidden">

<button onclick="showHome()" class="back-btn">⬅ Quay lại</button>

<h2 id="gameTitle" style="color:rgb(187, 28, 28);"></h2>

<iframe src="" id="gameFrame" scrolling="no" frameborder="0"></iframe>

</div>

</main>

</div>


<!-- Quảng cáo phải -->
<div class="ads right-ads">

<div class="qc4">
<button class="close-ad4">✖</button>
<img class="qc4" src="images/qc5.jpg">
</div>

<div class="qc5">
<button class="close-ad5">✖</button>
<img class="qc5" src="images/qc6.jpg">
</div>

<div class="qc6">
<button class="close-ad6">✖</button>
<img class="qc6" src="images/qc7.jpg">
</div>

</div>

</div>

<script src="trangchu.js"></script>

</body>
</html>
